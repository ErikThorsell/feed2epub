# Copy to secret.yaml (gitignored) and fill in -- or create/manage this Secret out-of-band (sealed-secrets,
# external-secrets, etc.). It provides the env var that feeds.yaml expands as ${INSTAPAPER_FEED_URL}; the app
# fails config-load if a referenced ${VAR} is unset. If none of your feeds reference a secret, omit this and
# drop the `envFrom` block from deployment.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: feed2epub-secret
  namespace: feed2epub
type: Opaque
stringData:
  INSTAPAPER_FEED_URL: "https://www.instapaper.com/rss/0000000/xxxxxxxxxxxxxxxxxxxxxxxxxxxx"
