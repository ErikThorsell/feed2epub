# feed2epub configuration. Mounted read-only into the container at /config/feeds.yaml.
# Edit this file and `docker compose restart fetcher` (or wait for the next daily run) to pick up changes.

output_dir: /library      # inside the container; bind-mounted to /mnt/container_volumes/feed2epub/library
retention_days: 3         # keep N days of daily EPUBs, then prune by filename date
max_age_hours: 72         # skip entries older than this; generous so a full front page of 15 survives the filter
request_timeout: 20
user_agent: "feed2epub/1.0 (+https://wirsenius.se)"

feeds:
  # Your Instapaper unread queue as one to-read EPUB (one chapter per saved article). Save an article to Instapaper
  # from any device (share sheet, browser extension, save-by-email) and it lands here on the next fetch -- nothing of
  # this service has to be exposed; feed2epub reaches out to Instapaper. The RSS URL carries a secret token, so it
  # lives in .env as ${INSTAPAPER_FEED_URL} (see .env.example), not in this tracked file.
  - url: ${INSTAPAPER_FEED_URL}
    name: Instapaper
    group: Instapaper     # one-feed group: titles/slugs the book "Instapaper" instead of the feed's own
                          # "Instapaper: Unread". Add more feeds to this group later to merge them into this book.
    full_text: true       # the Instapaper feed carries only a truncated excerpt; re-fetch each article's real body
    max_age_hours: 4320   # 180 days: a reading pile, not a daily feed. Instapaper itself drops items once archived.

  - url: https://news.ycombinator.com/rss
    name: Hacker News
    max_items: 15
    full_text: true       # fetch each linked article and extract its body; false = use the feed summary verbatim

  - url: https://lobste.rs/rss
    name: Lobsters
    max_items: 15
    full_text: true

  - url: https://www.christianitytoday.com/feed/
    name: Christianity Today
    max_items: 15
    full_text: true

  - url: https://sportrxiv.org/index.php/server/gateway/plugin/WebFeedGatewayPlugin/rss2
    name: SportRxiv
    max_items: 15
    full_text: false     # abstracts are already in the feed; scraping the OJS page would give a PDF-download stub

  # Feeds sharing a `group` are merged into one EPUB named after the group (here: wikipedia-<date>.epub),
  # in the order they appear below. Feeds without a `group` still get their own EPUB, as above.
  - url: https://en.wikipedia.org/w/api.php?action=featuredfeed&feed=featured&feedformat=atom
    name: Wikipedia Featured Article
    group: Wikipedia
    full_text: false     # the feed entry already carries a ~3.5k-char article extract
  - url: https://en.wikipedia.org/w/api.php?action=featuredfeed&feed=onthisday&feedformat=atom
    name: Wikipedia On This Day
    group: Wikipedia
    full_text: false
